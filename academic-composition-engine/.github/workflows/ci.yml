name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test-and-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: |
          pytest -q tests/test_smoke_cli.py tests/test_eval_baseline.py

      - name: Generate eval report
        run: |
          ace run-eval

      - name: Eval gate (best effort)
        run: |
          if [ -f eval/reports/baseline.json ]; then
            ace eval-gate --use-baseline --target latest --threshold-config eval/thresholds.json
          else
            echo "No baseline.json found; skipping eval-gate. Promote baseline first."
          fi
